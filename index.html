<!DOCTYPE html>
<html lang="ja">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東方封魔録Season2 - Modular</title>
    <style>
        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
        }

        div {
            white-space: pre-wrap;
        }

        #id {
            white-space: pre-wrap; 
            width: 350px;          
            word-break: break-all; 
        }

        body { 
            background: #222; 
            color: white; 
            text-align: center; 
            overflow: hidden; 
            font-family: sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            height: 100vh;           
        }
        
        canvas, #gameCanvas {
            background: #000;
            display: block;
            margin: 0 auto;
            border: 2px solid white;
            touch-action: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: auto;
            height: 90vh;
            max-width: 95vw;
            max-height: 90vh;
            aspect-ratio: 384 / 448;
        }
    </style>
</head>
<body>
    <script type="module">
        import { start } from './sys.js';
        import { functions } from "./boss.js";
        import { endless,stat } from "./engine.js";

        // UI要素の生成と配置
        const input = document.createElement('input');
        input.type = 'text';
        input.id = "input";
        input.placeholder = '文字を入力してください';

        const div = document.createElement('div');
        div.id = "div";

        const button = document.createElement('button');
        button.id = "btn";
        button.type = "button";
        button.textContent = "遊ぶ";

        const sp = document.createElement('div');
        sp.id = "id";

        document.body.append(input, button, div, sp);

        // 初期化処理の実行
        endless();

        // ボタンクリック時の処理（バリデーションとゲーム開始）
        function buttonPush() {
            const spell = input.value;
            const sn = Number(spell) - 1; // 💡修正：可読性のため spell - 1 ではなく明示的にNumberにキャスト
            
            div.style.backgroundColor = "white"; // 💡修正: 'lightwhite'という色は存在しないため'white'に変更
            div.style.color = "#D40014";        // 💡修正: # を追加
            div.textContent = "";

            // ストレージクリアコマンド
            if (spell === "$()") {
                localStorage.clear();
                const n = localStorage.getItem("sd");
                div.textContent = `正常にローカルストレージをクリアしました。${n}`;
                return;
            }

            // エラーチェック（早期リターン（Early Return）ガード句）
            if (!spell) {
                div.textContent = "文字が入力されていません。";
                return;
            }
            if (isNaN(sn) || sn < 0 || Number(spell) <= 0) {
                div.textContent = `入力された値\n${spell}\nは不正です。${functions.length}以下の半角数字を入力してください`;
                return;
            }
            if (sn >= functions.length || !functions[sn]) {
                div.textContent = "存在していないスペルカードです。スペルナンバーを下げるまたは再確認してやり直してね";
                return;
            }
            
            // 画面上の入力UIを削除してゲームへ移行
            div.remove();
            input.remove();
            button.remove();
            sp.remove();
cancelAnimationFrame(stat.gameId); 
    // 💡 ボタンが押された「今」、画面にあるキャンバスをピンポイントで取得する
  
            start(sn);
        }

        // 入力時のリアルタイムプレビュー処理
        function checkInput() {
            const v = Number(input.value) - 1;
            const fn = functions[v];

            // 💡安全対策：該当するスペルデータがない（範囲外など）なら処理しない
            if (!fn) {
                sp.textContent = "";
                return;
            }

            // 💡安全対策：localStorageが空、またはデータが壊れていてもクラッシュしないように分解
            const storageData = localStorage.getItem("sd");
            let clg = null;
            if (storageData) {
                try {
                    const parsed = JSON.parse(storageData);
                    if (parsed && parsed[v]) {
                        clg = parsed[v];
                    }
                } catch (e) {
                    console.error("Storage parse error:", e);
                }
            }

            div.textContent = ""; // 💡バグ修正: diva ではなく div。エラー文の初期化

            const name = fn.name ?? "無名";
            const desc = fn.desc ?? "説明文はまだ書かれていません。";
            const time = fn.time ? "制限時間:" + fn.time + "s" : "";
            const limit = fn.limit ? "特殊変化:" + fn.limit : "";
            const hint = fn.hint ?? "";
            
            const g = String(clg?.gets ?? 0).padStart(3, "0");
            const am = String(clg?.amount ?? 0).padStart(3, "0");

            sp.textContent = `
名前:${name}

説明文:${desc}

${time} | ${limit} 

ヒント:${hint}

${g}/${am}`;
        }

        // イベントリスナーの登録
        button.addEventListener("click", buttonPush);
        input.addEventListener("input", checkInput);

        // タッチ制御用（必要に応じてセットアップ）
        setTimeout(() => {
            const canvasElement = document.getElementById("gameCanvas");
            if (!canvasElement) return;

            let lastTouchX = 0;
            let lastTouchY = 0;
        }, 100);
    </script>
</body>
</html>
