<!DOCTYPE html>
<html lang="ja">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東方封魔録Season2 - Modular</title>
    <style>
        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
        }

        div {
           white-space: pre-wrap;
        }

        #id {
            white-space: pre-wrap; 
            width: 350px;          
            word-break: break-all; 
        }

        body { 
            background: #222; 
            color: white; 
            text-align: center; 
            overflow: hidden; 
            font-family: sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            height: 100vh;           
        }
        
        canvas, #gameCanvas {
            background: #000;

            display: block;
            margin: 0 auto;
            border: 2px solid white;
            touch-action: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: auto;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 384 / 448;
        }

        /* 💡追加：画面上部に表示する可変画像用のスタイル */
        #topImages {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            z-index: 10;
            pointer-events: none; /* 画像がクリック等を邪魔しないように */
        }

        #img64 {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #img16 {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <script type="module">
        import { start } from './sys.js';
        import { functions } from "./boss.js";
        import { endless,stat } from "./engine.js";

        // 💡追加：16x16画像のdif値ごとのパス対応表（あとで自由に書き換えてください）
        const difImageMap = {
            E: "images/easy.png",
            N: "images/normal.png",
            H: "images/hard.png",
            L: "images/lunatic.png"
        };

        // 💡追加：64x64画像のパス（クリア済み/未クリアの2種類）
        const clearImagePath = "images/clear.png";
        const noClearImagePath = "images/noclear.png";

        // UI要素の生成と配置
        const input = document.createElement('input');
        input.type = 'text';
        input.id = "input";
        input.placeholder = '文字を入力してください';

        const div = document.createElement('div');
        div.id = "div";

        const button = document.createElement('button');
        button.id = "btn";
        button.type = "button";
        button.textContent = "遊ぶ";

        const sp = document.createElement('div');
        sp.id = "id";

        // 💡追加：画面上部の可変画像コンテナと画像要素
        const topImages = document.createElement('div');
        topImages.id = "topImages";

        const img64 = document.createElement('img');
        img64.id = "img64";
        img64.alt = "";
        img64.style.display = "none";

        const img16 = document.createElement('img');
        img16.id = "img16";
        img16.alt = "";
        img16.style.display = "none";

        topImages.append(img64, img16);

        document.body.append(topImages, input, button, div, sp);

        // 初期化処理の実行
        endless();

        // ボタンクリック時の処理（バリデーションとゲーム開始）
        function buttonPush() {
            const spell = input.value;
            const sn = Number(spell) - 1; // 💡修正：可読性のため spell - 1 ではなく明示的にNumberにキャスト
            
            div.style.backgroundColor = "white"; // 💡修正: 'lightwhite'という色は存在しないため'white'に変更
            div.style.color = "#D40014";        // 💡修正: # を追加
            div.textContent = "";

            // ストレージクリアコマンド
            if (spell === "$()") {
                localStorage.clear();
                const n = localStorage.getItem("sd");
                div.textContent = `正常にローカルストレージをクリアしました。${n}`;
                return;
            }

            // エラーチェック（早期リターン（Early Return）ガード句）
            if (!spell) {
                div.textContent = "文字が入力されていません。";
                return;
            }
            if (isNaN(sn) || sn < 0 || Number(spell) <= 0) {
                div.textContent = `入力された値\n${spell}\nは不正です。${functions.length}以下の半角数字を入力してください`;
                return;
            }
            if (sn >= functions.length || !functions[sn]) {
                div.textContent = "存在していないスペルカードです。スペルナンバーを下げるまたは再確認してやり直してね";
                return;
            }
            
            // 画面上の入力UIを削除してゲームへ移行
            div.remove();
            input.remove();
            button.remove();
            sp.remove();
            topImages.remove(); // 💡追加：スタート時に画像コンテナごと削除
cancelAnimationFrame(stat.gameId); 
    // 💡 ボタンが押された「今」、画面にあるキャンバスをピンポイントで取得する
  
            start(sn);
        }

        // 入力時のリアルタイムプレビュー処理
        function checkInput() {
            const v = Number(input.value) - 1;
            const fn = functions[v];

            // 💡安全対策：該当するスペルデータがない（範囲外など）なら処理しない
            if (!fn) {
                sp.textContent = "";
                img64.style.display = "none"; // 💡追加：無効な入力なら画像を隠す
                img16.style.display = "none";
                return;
            }

            // 💡安全対策：localStorageが空、またはデータが壊れていてもクラッシュしないように分解
            const storageData = localStorage.getItem("sd");
            let clg = null;
            if (storageData) {
                try {
                    const parsed = JSON.parse(storageData);
                    if (parsed && parsed[v]) {
                        clg = parsed[v];
                    }
                } catch (e) {
                    console.error("Storage parse error:", e);
                }
            }

            div.textContent = ""; // 💡バグ修正: diva ではなく div。エラー文の初期化

            const name = fn.name ?? "無名";
            const desc = fn.desc ?? "説明文はまだ書かれていません。";
            const time = fn.time ? "制限時間:" + fn.time + "s" : "";
            const limit = fn.limit ? "特殊変化:" + fn.limit : "";
            const hint = fn.hint ?? "";
            
            const g = String(clg?.gets ?? 0).padStart(3, "0");
            const am = String(clg?.amount ?? 0).padStart(3, "0");
            const clear = (clg?.gets ?? 0) > 0;
            const nm = clg?.nm ?? false;
            const LastClear = (nm && clear) ? "assets/nc.png" : "assets/c.png";
            sp.textContent = `
名前:${name}

説明文:${desc}

${time} | ${limit} 

ヒント:${hint}

${g}/${am}`;

            // 💡追加：64x64画像 → clg.nc（true/false）に応じてクリア/未クリア画像を切り替え
            const nc = clg?.nc ?? false;
            img64.src = LastClear;
            img64.style.display = "block";

            // 💡追加：16x16画像 → fn.dif（E/N/H/L）に応じて難易度画像を切り替え
            const difPath = fn.dif ? "assets/"+fn.dif+".png" : "assets/e.png"
            if (difPath) {
                img16.src = difPath;
                img16.style.display = "block";
            } else {
                img16.style.display = "none";
            }
        }

        // イベントリスナーの登録
        button.addEventListener("click", buttonPush);
        input.addEventListener("input", checkInput);

        // タッチ制御用（必要に応じてセットアップ）
        setTimeout(() => {
            const canvasElement = document.getElementById("gameCanvas");
            if (!canvasElement) return;

            let lastTouchX = 0;
            let lastTouchY = 0;
        }, 100);
    </script>
</body>
</html>
