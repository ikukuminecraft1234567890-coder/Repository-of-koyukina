<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 2D グリッチエフェクト テスト</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: #050510;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h2>Canvas Glitch Effect Test</h2>
    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        画面内をマウス移動 / タッチでキャラクターが動きます
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 東方サイズ（384x448）を基準に設定
const VIRTUAL_WIDTH = 384;
const VIRTUAL_HEIGHT = 448;
canvas.width = VIRTUAL_WIDTH;
canvas.height = VIRTUAL_HEIGHT;

// テスト用プレイヤーオブジェクト
const player = {
    x: VIRTUAL_WIDTH / 2,
    y: VIRTUAL_HEIGHT / 2 + 100,
    w: 48,
    h: 48,
    angle: 0
};

// --- ダミーのキャラクター画像をCanvasで生成（キャッシュ化） ---
const imgList = new Map();
const key = "player-invincible";

const dummyCanvas = document.createElement("canvas");
dummyCanvas.width = 48;
dummyCanvas.height = 48;
const dCtx = dummyCanvas.getContext("2d");

// 幻想彩色（Glow）を模したベース絵の描画
dCtx.fillStyle = "#00ffcc"; // 無敵シアン
dCtx.fillRect(8, 8, 32, 32);
dCtx.fillStyle = "#ffffff"; // 目に見立てた白いパーツ
dCtx.fillRect(14, 16, 6, 6);
dCtx.fillRect(28, 16, 6, 6);

imgList.set(key, dummyCanvas);
// --------------------------------------------------

// マウス・タッチ位置連動
function updatePosition(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // 仮想サイズへのスケール変換
    player.x = (clientX - rect.left) * (VIRTUAL_WIDTH / rect.width);
    player.y = (clientY - rect.top) * (VIRTUAL_HEIGHT / rect.height);
}
window.addEventListener("mousemove", updatePosition);
window.addEventListener("touchmove", updatePosition, { passive: false });

/**
 * グリッチエフェクト描画関数
 */
function drawGlitchEntity(key, x, y, w, h, angle) {
    const cached = imgList.get(key);
    if (!cached) return;

    // 40%の確率で激しいグリッチ（バグ）を発生させる
    if (Math.random() > 0.4) {
        // 画像を何分割の帯にするか（3〜7個）
        const slices = Math.floor(Math.random() * 5) + 3;
        
        const origW = cached.width;
        const origH = cached.height;
        const sliceH = origH / slices;       // 切り取り元の高さ
        const displaySliceH = h / slices;    // 画面上の表示高さ

        for (let i = 0; i < slices; i++) {
            const sliceY = i * sliceH;
            const displaySliceY = i * displaySliceH;

            // 横方向のランダムなズレ（ジッタ）（*2）
            const offsetX = (Math.random() - 0.5) * 20;

            ctx.save();
            ctx.translate(x + offsetX, y);
            ctx.rotate(angle);

            // 9引数版 drawImage で細切れにして転写
            ctx.drawImage(
                cached,
                0, sliceY, origW, sliceH,
                -w / 2, -h / 2 + displaySliceY, w, displaySliceH
            );
            ctx.restore();
        }

        // 稀にマゼンタのノイズ帯を重ねてサイバー感を強調
        if (Math.random() > 0.7) {
            ctx.fillStyle = "rgba(255, 0, 128, 0.4)";
            ctx.fillRect(
                x - w / 2 + (Math.random() - 0.5) * 15, 
                y - h / 2 + Math.random() * h, 
                w * (Math.random() + 0.5), 
                Math.random() * 4
            );
        }
    } else {
        // グリッチがないフレームは高速点滅（50ms周期で非表示フレームを作る）（*3）
        if (Math.floor(Date.now() / 50) % 2 === 0) return;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.drawImage(cached, -w / 2, -h / 2, w, h);
        ctx.restore();
    }
}

// メインループ
function loop() {
    // 画面クリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景に簡単なグリッド線を描画（背景が動くとグリッチが際立つため）
    ctx.strokeStyle = "#111125";
    ctx.lineWidth = 1;
    for(let i=0; i<VIRTUAL_WIDTH; i+=32) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, VIRTUAL_HEIGHT); ctx.stroke();
    }
    for(let i=0; i<VIRTUAL_HEIGHT; i+=32) {
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(VIRTUAL_WIDTH, i); ctx.stroke();
    }

    // プレイヤーのグリッチ描画を実行
    drawGlitchEntity(key, player.x, player.y, player.w, player.h, player.angle);

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
