<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Canvas Image Test</title>
</head>
<body>

    <canvas id="myCanvas" width="500" height="400" style="border:1px solid #000;"></canvas>

    <script>
        // ② Canvasとコンテキスト（2D描画機能）を取得
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        // ③ 画像オブジェクトを作成
        const img = new Image();
        img.src = 'https://picsum.photos/300/200'; // ここに画像のURLを入れる

        // ④ 重要！画像が「読み込み終わってから」描画する
        img.onload = function() {
            // drawImage(画像, X座標, Y座標)
            ctx.drawImage(img, 50, 50);
        };
    </script>

</body>
</html>
