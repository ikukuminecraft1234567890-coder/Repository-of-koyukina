<input type="file" id="file">

<select id="colorMode">
    <option value="blue">東方青</option>
    <option value="red">赤</option>
    <option value="green">エメラルド</option>
</select>

<br><br>

<label>
発光強度
<input type="range"
       id="glow"
       min="0"
       max="30"
       value="12">
</label>

<br><br>

<canvas id="canvas"></canvas>
<script>

const fileInput = document.getElementById("file");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const colorMode = document.getElementById("colorMode");
const glowSlider = document.getElementById("glow");

function lerp(a,b,t){
    return a + (b-a)*t;
}

function sampleGradient(gray, mode){

    let c1,c2,c3,c4;

    switch(mode){

        case "red":
            c1=[40,0,0];
            c2=[150,0,0];
            c3=[255,80,80];
            c4=[255,255,255];
            break;

        case "green":
            c1=[0,30,0];
            c2=[0,120,40];
            c3=[80,255,180];
            c4=[255,255,255];
            break;

        default: // 東方青

            c1=[0,10,80];
            c2=[0,50,200];
            c3=[120,180,255];
            c4=[255,255,255];
    }

    let t = gray / 255;

    let a,b,k;

    if(t < 0.33){
        a=c1;
        b=c2;
        k=t/0.33;
    }
    else if(t < 0.66){
        a=c2;
        b=c3;
        k=(t-0.33)/0.33;
    }
    else{
        a=c3;
        b=c4;
        k=(t-0.66)/0.34;
    }

    return [
        lerp(a[0],b[0],k),
        lerp(a[1],b[1],k),
        lerp(a[2],b[2],k)
    ];
}

function render(img){

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    let imageData =
        ctx.getImageData(
            0,
            0,
            canvas.width,
            canvas.height
        );

    let d = imageData.data;

    for(let i=0;i<d.length;i+=4){

        let gray =
            d[i]*0.299 +
            d[i+1]*0.587 +
            d[i+2]*0.114;

        let [r,g,b] =
            sampleGradient(
                gray,
                colorMode.value
            );

        d[i]=r;
        d[i+1]=g;
        d[i+2]=b;
    }

    ctx.putImageData(imageData,0,0);

    const glow = glowSlider.value;

    ctx.globalCompositeOperation =
        "screen";

    ctx.filter =
        `blur(${glow}px)`;

    ctx.drawImage(
        canvas,
        0,
        0
    );

    ctx.filter = "none";

    ctx.drawImage(
        canvas,
        0,
        0
    );

    ctx.globalCompositeOperation =
        "source-over";
}

fileInput.addEventListener("change",e=>{

    const file =
        e.target.files[0];

    if(!file) return;

    const img =
        new Image();

    img.onload = () => {

        render(img);

        colorMode.onchange =
            ()=>render(img);

        glowSlider.oninput =
            ()=>render(img);
    };

    img.src =
        URL.createObjectURL(file);
});

</script>
