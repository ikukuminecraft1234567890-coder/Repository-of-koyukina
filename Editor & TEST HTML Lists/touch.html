<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Danmaku Editor - Minimal</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #111;
            color: #00ff66;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* キャンバス領域（コントロールパネルと重ならない独立エリア） */
        #canvasContainer {
            flex: 1;
            position: relative;
            background: #1a1a1a;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ミニマムモニター（右上固定） */
        #monitorPanel {
            position: absolute;
            top: 10px; right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #333;
            font-size: 0.85rem;
            pointer-events: none;
            line-height: 1.4;
        }
        .mon-row span { color: #fff; }
        .mon-row .val-cnt { color: #ff00ff; font-weight: bold; }

        /* 極限まで無駄を削った下部コントロールパネル */
        #controlPanel {
            background: #050505;
            border-top: 2px solid #222;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 1行目：基本設定・切り替え */
        .ctrl-row-top {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
        }
        .mode-toggle {
            flex: 2;
            display: flex;
            border: 1px solid #00ff66;
            border-radius: 4px;
            overflow: hidden;
        }
        .mode-btn {
            flex: 1;
            background: #111;
            color: #00ff66;
            text-align: center;
            padding: 6px 0;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #00ff66;
            color: #000;
        }
        .syntax-input {
            flex: 3;
            background: #111;
            border: 1px solid #00ff66;
            color: #00ff66;
            padding: 6px;
            font-family: monospace;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        /* 2行目：数値パラメーター群 */
        .ctrl-row-mid {
            display: flex;
            gap: 6px;
        }
        .num-field {
            flex: 1;
            display: flex;
            align-items: center;
            background: #111;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 6px;
        }
        .num-field label {
            font-size: 0.75rem;
            color: #888;
            margin-right: 4px;
        }
        .num-field input {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
        }

        /* 3行目：アクションボタン */
        .ctrl-row-bot {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            flex: 1;
            background: #222;
            color: #00ff66;
            border: 1px solid #00ff66;
            padding: 8px 0;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .action-btn:active { background: #111; }
        .action-btn.toggle-on {
            background: #005522;
            color: #00ff66;
            border-color: #00ff66;
        }
        #btnExport { background: #00ff66; color: #000; }
        #btnExport:active { background: #00aa44; }
        #btnClear { border-color: #ff3333; color: #ff3333; }
        #btnClear:active { background: #330000; }
    </style>
</head>
<body>

<div id="canvasContainer">
    <div id="monitorPanel">
        <div class="mon-row">ANG: <span id="monAng">0°</span></div>
        <div class="mon-row">RAD: <span id="monRad">0.0000</span></div>
        <div class="mon-row">QTY: <span id="monQty" class="val-cnt">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="controlPanel">
    <div class="ctrl-row-top">
        <div class="mode-toggle">
            <div id="btnModePrev" class="mode-btn active">PREVIEW</div>
            <div id="btnModePen" class="mode-btn">PEN</div>
        </div>
        <input type="text" id="textInput" class="syntax-input" value="for(i=-2; i<=2; i++)">
    </div>

    <div class="ctrl-row-mid">
        <div class="num-field"><label>X:</label><input type="number" id="inputX"></div>
        <div class="num-field"><label>Y:</label><input type="number" id="inputY"></div>
        <div class="num-field"><label>ANG°:</label><input type="number" id="inputDeg" step="1"></div>
    </div>

    <div class="ctrl-row-bot">
        <button type="button" id="btnAutoPlay" class="action-btn">AUTO: OFF</button>
        <button type="button" id="btnExport" class="action-btn">OUTPUT (JSON)</button>
        <button type="button" id="btnClear" class="action-btn">CLEAR</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const container = document.getElementById("canvasContainer");
    const ctx = canvas.getContext("2d");

    // UIノード
    const monAng = document.getElementById("monAng");
    const monRad = document.getElementById("monRad");
    const monQty = document.getElementById("monQty");
    const textInput = document.getElementById("textInput");
    
    const btnModePrev = document.getElementById("btnModePrev");
    const btnModePen = document.getElementById("btnModePen");
    const btnAutoPlay = document.getElementById("btnAutoPlay");
    const btnExport = document.getElementById("btnExport");
    const btnClear = document.getElementById("btnClear");

    const inputX = document.getElementById("inputX");
    const inputY = document.getElementById("inputY");
    const inputDeg = document.getElementById("inputDeg");

    const colors = ["#ff3333", "#3333ff", "#33ff33", "#ffff33", "#ff33ff"];

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // 内部ステート
    const state = {
        mode: "preview", // "preview" or "pen"
        autoPlay: false,
        startX: canvas.width / 2,
        startY: canvas.height / 2,
        currentX: canvas.width / 2,
        currentY: canvas.height / 2,
        isDrawing: false,
        angle: 0,
        bullets: [],
        editorData: [],
        lastPlacedX: 0,
        lastPlacedY: 0
    };

    // 初期値同期
    inputX.value = Math.floor(canvas.width / 2);
    inputY.value = Math.floor(canvas.height / 2);
    inputDeg.value = 0;
    updateFromInputs();

    function calculateAngle(x1, y1, x2, y2) {
        return Math.atan2(y2 - y1, x2 - x1);
    }

    function syncStateToInputs() {
        inputX.value = Math.floor(state.startX);
        inputY.value = Math.floor(state.startY);
        const deg = Math.floor(state.angle * (180 / Math.PI));
        inputDeg.value = deg;
        
        monAng.textContent = `${deg}°`;
        monRad.textContent = state.angle.toFixed(4);
    }

    function updateFromInputs() {
        state.startX = parseFloat(inputX.value) || 0;
        state.startY = parseFloat(inputY.value) || 0;
        const deg = parseFloat(inputDeg.value) || 0;
        state.angle = deg * (Math.PI / 180);

        state.currentX = state.startX + Math.cos(state.angle) * 60;
        state.currentY = state.startY + Math.sin(state.angle) * 60;
        
        monAng.textContent = `${Math.floor(deg)}°`;
        monRad.textContent = state.angle.toFixed(4);
    }

    // モード切り替え
    btnModePrev.addEventListener("click", () => {
        state.mode = "preview";
        btnModePrev.classList.add("active");
        btnModePen.classList.remove("active");
    });
    btnModePen.addEventListener("click", () => {
        state.mode = "pen";
        btnModePen.classList.add("active");
        btnModePrev.classList.remove("active");
    });

    // オート連射トグル
    btnAutoPlay.addEventListener("click", () => {
        state.autoPlay = !state.autoPlay;
        if(state.autoPlay) {
            btnAutoPlay.textContent = "AUTO: ON";
            btnAutoPlay.classList.add("toggle-on");
        } else {
            btnAutoPlay.textContent = "AUTO: OFF";
            btnAutoPlay.classList.remove("toggle-on");
        }
    });

    inputX.addEventListener("input", updateFromInputs);
    inputY.addEventListener("input", updateFromInputs);
    inputDeg.addEventListener("input", updateFromInputs);

    // 弾データ生成ロジック
    function generateBulletObjects(centerX, centerY, baseAngle) {
        const rawText = textInput.value.trim();
        const generated = [];
        const forRegex = /for\s*\(\s*i\s*=\s*(-?\d+)\s*;\s*i\s*<=\s*(-?\d+)\s*;\s*i\s*\+\+\s*\)/;
        const match = rawText.match(forRegex);

        if (match) {
            const minI = parseInt(match[1], 10);
            const maxI = parseInt(match[2], 10);
            let colorIndex = 0;
            for (let i = minI; i <= maxI; i++) {
                const offsetAngle = baseAngle + (i * (15 * Math.PI / 180));
                const deg = Math.floor(offsetAngle * (180 / Math.PI)) % 360;
                generated.push({
                    x: Math.floor(centerX),
                    y: Math.floor(centerY),
                    angleRad: parseFloat(offsetAngle.toFixed(4)),
                    angleDeg: deg < 0 ? deg + 360 : deg,
                    color: colors[colorIndex % colors.length]
                });
                colorIndex++;
            }
        } else {
            const deg = Math.floor(baseAngle * (180 / Math.PI)) % 360;
            generated.push({
                x: Math.floor(centerX),
                y: Math.floor(centerY),
                angleRad: parseFloat(baseAngle.toFixed(4)),
                angleDeg: deg < 0 ? deg + 360 : deg,
                color: colors[0]
            });
        }
        return generated;
    }

    // ペンモード用の連続・単発配置ハンドラ
    function handlePenPlacement(clientX, clientY, isMove = false) {
        // 移動時は前回のプロット地点から一定以上の距離（ドット数）が離れた時だけ打つ（密度調整）
        if (isMove) {
            const dist = Math.hypot(clientX - state.lastPlacedX, clientY - state.lastPlacedY);
            if (dist < 15) return; 
        }

        const rect = canvas.getBoundingClientRect();
        const canvasX = clientX - rect.left;
        const canvasY = clientY - rect.top;

        const newBullets = generateBulletObjects(canvasX, canvasY, state.angle);
        state.editorData = state.editorData.concat(newBullets);
        monQty.textContent = state.editorData.length;

        // トリガー直後のエフェクト描画
        newBullets.forEach(b => {
            state.bullets.push({ x: b.x, y: b.y, angle: b.angleRad, color: b.color, speed: 5, length: 30 });
        });

        state.lastPlacedX = clientX;
        state.lastPlacedY = clientY;

        // 入力欄上の座標も追従させる
        state.startX = canvasX;
        state.startY = canvasY;
        inputX.value = Math.floor(canvasX);
        inputY.value = Math.floor(canvasY);
    }

    // 定期自動連射処理 (毎秒発動)
    setInterval(() => {
        if (!state.autoPlay) return;
        
        // 1: エディタモードでデータがある場合はそこから一斉射撃
        if (state.editorData.length > 0) {
            state.editorData.forEach(pt => {
                state.bullets.push({
                    x: pt.x, y: pt.y, angle: pt.angleRad, color: pt.color, speed: 5, length: 30
                });
            });
        } else {
            // 2: データが空なら、現在選択されている中心点(Previewのピン)から構文通りに発射
            const activeBullets = generateBulletObjects(state.startX, state.startY, state.angle);
            activeBullets.forEach(b => {
                state.bullets.push({
                    x: b.x, y: b.y, angle: b.angleRad, color: b.color, speed: 5, length: 30
                });
            });
        }
    }, 1000);

    // --- マウス / タッチ統合入力処理 ---
    function getEventXY(e) {
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
    }

    function onPointerStart(e) {
        if (e.target !== canvas) return;
        e.preventDefault();
        state.isDrawing = true;
        
        const pos = getEventXY(e);
        if (state.mode === "pen") {
            handlePenPlacement(pos.x, pos.y, false);
        } else {
            const rect = canvas.getBoundingClientRect();
            state.startX = state.currentX = pos.x - rect.left;
            state.startY = state.currentY = pos.y - rect.top;
            syncStateToInputs();
        }
    }

    function onPointerMove(e) {
        if (!state.isDrawing) return;
        e.preventDefault();
        
        const pos = getEventXY(e);
        if (state.mode === "pen") {
            handlePenPlacement(pos.x, pos.y, true);
        } else {
            const rect = canvas.getBoundingClientRect();
            state.currentX = pos.x - rect.left;
            state.currentY = pos.y - rect.top;
            state.angle = calculateAngle(state.startX, state.startY, state.currentX, state.currentY);
            syncStateToInputs();
        }
    }

    function onPointerEnd() {
        state.isDrawing = false;
    }

    canvas.addEventListener("touchstart", onPointerStart, { passive: false });
    canvas.addEventListener("touchmove", onPointerMove, { passive: false });
    canvas.addEventListener("touchend", onPointerEnd, { passive: false });
    canvas.addEventListener("mousedown", onPointerStart);
    canvas.addEventListener("mousemove", onPointerMove);
    canvas.addEventListener("mouseup", onPointerEnd);

    // ボタンハンドラー
    btnExport.addEventListener("click", () => {
        const jsonStr = JSON.stringify(state.editorData, null, 2);
        console.log(jsonStr);
        navigator.clipboard.writeText(jsonStr).then(() => {
            alert(`JSON配列データ（弾数: ${state.editorData.length}個）をクリップボードに格納しました！`);
        }).catch(() => {
            alert("Consoleに出力しました。F12を開いて確認してください。");
        });
    });

    btnClear.addEventListener("click", () => {
        state.bullets = [];
        state.editorData = [];
        monQty.textContent = "0";
    });

    // --- レンダリングループ ---
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. ガイドライン表示（PREVIEWモード時のみ）
        if (state.mode === "preview") {
            ctx.beginPath();
            ctx.strokeStyle = state.isDrawing ? "#00ff66" : "#005522";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 4]);
            ctx.moveTo(state.startX, state.startY);
            ctx.lineTo(state.currentX, state.currentY);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.beginPath();
            ctx.arc(state.startX, state.startY, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#00ff66";
            ctx.fill();
        }

        // 2. ペンモード等で配置された全座標データのプロット（静止ガイド点）
        state.editorData.forEach(pt => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0, 255, 102, 0.5)";
            ctx.fill();
            
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255, 0, 255, 0.4)";
            ctx.lineWidth = 1;
            ctx.moveTo(pt.x, pt.y);
            ctx.lineTo(pt.x + Math.cos(pt.angleRad) * 12, pt.y + Math.sin(pt.angleRad) * 12);
            ctx.stroke();
        });

        // 3. 飛散する弾のアニメーション更新・描画
        state.bullets.forEach((b) => {
            b.x += Math.cos(b.angle) * b.speed;
            b.y += Math.sin(b.angle) * b.speed;

            ctx.beginPath();
            ctx.strokeStyle = b.color;
            ctx.lineWidth = 2.5;
            ctx.lineCap = "round";
            ctx.moveTo(b.x, b.y);
            ctx.lineTo(b.x - Math.cos(b.angle) * b.length, b.y - Math.sin(b.angle) * b.length);
            ctx.stroke();
        });

        // 画面外シザリング
        state.bullets = state.bullets.filter(b => 
            b.x >= -50 && b.x <= canvas.width + 50 && b.y >= -50 && b.y <= canvas.height + 50
        );

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
