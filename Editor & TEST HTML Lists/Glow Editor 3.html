<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幻想彩色 — Glow Filter (Dynamic Text Input)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght=300;400&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #05070f;
    --surface: #0a0d1a;
    --border:  #1a2040;
    --accent:  #3a6fff;
    --accent2: #7eb4ff;
    --text:    #c8d8ff;
    --muted:   #4a5880;
    --font-jp:   'Noto Serif JP', serif;
    --font-mono: 'Share Tech Mono', monospace;
    --error:     #ff4a4a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-jp);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── ヘッダー ── */
  header {
    width: 100%;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-size: 1.35rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--accent2);
  }
  header span {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── メイン ── */
  main {
    width: 100%;
    max-width: 1100px;
    padding: 36px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ── コントロールパネル ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    align-items: flex-end;
  }

  .field { display: flex; flex-direction: column; gap: 8px; }

  .field-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ファイルボタン */
  .file-btn { position: relative; cursor: pointer; }
  .file-btn input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .file-btn-inner {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 18px;
    border: 1px solid var(--accent); border-radius: 3px;
    font-family: var(--font-jp); font-size: 0.8rem;
    letter-spacing: 0.1em; color: var(--accent2);
    background: transparent;
    transition: background 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  .file-btn:hover .file-btn-inner {
    background: rgba(58,111,255,0.1);
    border-color: var(--accent2);
  }

  /* テキストインプット */
  .input-wrap { position: relative; display: flex; align-items: center; }
  
  input[type="text"]#colorHex {
    background: var(--bg);
    border: 1px solid var(--border); border-radius: 3px;
    color: var(--text);
    font-family: var(--font-mono); font-size: 0.85rem;
    letter-spacing: 0.05em;
    padding: 9px 36px 9px 14px;
    width: 130px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input[type="text"]#colorHex:focus { border-color: var(--accent); }
  input[type="text"]#colorHex.invalid { border-color: var(--error); box-shadow: 0 0 4px rgba(255, 74, 74, 0.2); }

  /* 色プレビューミニ窓 */
  .color-preview-badge {
    position: absolute; right: 12px;
    width: 14px; height: 14px; border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--accent);
    transition: background 0.15s;
  }

  /* スライダー */
  .slider-wrap { display: flex; flex-direction: column; gap: 8px; min-width: 180px; flex: 1; }
  .slider-header { display: flex; justify-content: space-between; align-items: baseline; }
  #glow-val { font-family: var(--font-mono); font-size: 0.72rem; color: var(--accent2); }

  input[type="range"]#glow {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct,40%), var(--border) var(--pct,40%));
    border-radius: 1px; outline: none; cursor: pointer;
  }
  input[type="range"]#glow::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent2); border: 2px solid var(--bg);
    box-shadow: 0 0 8px var(--accent);
    transition: box-shadow 0.18s;
  }
  input[type="range"]#glow::-webkit-slider-thumb:hover { box-shadow: 0 0 14px var(--accent2); }
  input[type="range"]#glow::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent2); border: 2px solid var(--bg);
    box-shadow: 0 0 8px var(--accent);
  }

  /* ダウンロードボタン */
  #dl-btn {
    margin-left: auto;
    padding: 9px 20px;
    background: transparent;
    border: 1px solid var(--muted); border-radius: 3px;
    color: var(--muted);
    font-family: var(--font-jp); font-size: 0.8rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: border-color 0.18s, color 0.18s, background 0.18s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  #dl-btn.active {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  #dl-btn.active:hover {
    background: rgba(58,111,255,0.12);
  }
  #dl-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── セクションラベル ── */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── 比較エリア（元解像度） ── */
  .compare-wrap {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .compare-wrap.visible { display: flex; }

  .compare-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .compare-pane {
    background: #020308;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: auto;
    position: relative;
  }

  .pane-label {
    position: sticky;
    top: 0; left: 0;
    z-index: 2;
    display: inline-block;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    background: rgba(5,7,15,0.85);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--muted);
    width: 100%;
  }

  .compare-pane canvas { display: block; }

  /* ── 拡大プレビューエリア ── */
  .enlarged-wrap {
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .enlarged-wrap.visible { display: flex; }

  .enlarged-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .enlarged-pane {
    background: #020308;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .enlarged-pane canvas {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* プレースホルダー */
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    min-height: 200px;
    padding: 40px;
  }
  .placeholder p { font-size: 0.75rem; letter-spacing: 0.15em; }

  #canvas { display: none; }
</style>
</head>
<body>

<header>
  <h1>幻想彩色</h1>
  <span>GLOW FILTER v3.0 (Dynamic Custom Color)</span>
</header>

<main>

  <div class="panel">

    <div class="field">
      <span class="field-label">画像</span>
      <div class="file-btn">
        <input type="file" id="file" accept="image/*">
        <div class="file-btn-inner">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v8M4 4l3-3 3 3M2 10h10v2H2z" stroke="#7eb4ff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          ファイルを選択
        </div>
      </div>
    </div>

    <div class="field">
      <span class="field-label">発光ベースカラー</span>
      <div class="input-wrap">
        <input type="text" id="colorHex" value="#3a6fff" placeholder="#ffffff" maxlength="7">
        <div class="color-preview-badge" id="colorBadge"></div>
      </div>
    </div>

    <div class="slider-wrap">
      <div class="slider-header">
        <span class="field-label">発光強度</span>
        <span id="glow-val">12</span>
      </div>
      <input type="range" id="glow" min="0" max="120" value="12">
    </div>

    <button id="dl-btn" disabled>
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M6.5 1v7M4 6l2.5 3L9 6M1 10h11v2H1z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      変換後をDL
    </button>

  </div>

  <div class="compare-wrap" id="compare-wrap">
    <div class="section-label">比較 — 元解像度</div>
    <div class="compare-row">
      <div class="compare-pane">
        <div class="pane-label">BEFORE</div>
        <canvas id="before-canvas"></canvas>
      </div>
      <div class="compare-pane">
        <div class="pane-label">AFTER</div>
        <canvas id="after-canvas"></canvas>
      </div>
    </div>
  </div>

  <div class="enlarged-wrap" id="enlarged-wrap">
    <div class="section-label">拡大プレビュー — 低解像度画像向け</div>
    <div class="enlarged-row">
      <div class="enlarged-pane">
        <div class="pane-label">BEFORE (拡大)</div>
        <canvas id="before-enlarged"></canvas>
      </div>
      <div class="enlarged-pane">
        <div class="pane-label">AFTER (拡大)</div>
        <canvas id="after-enlarged"></canvas>
      </div>
    </div>
  </div>

  <div class="placeholder" id="placeholder">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect x="2" y="6" width="32" height="24" rx="2" stroke="#1a2040" stroke-width="1.5"/>
      <circle cx="12" cy="16" r="4" stroke="#1a2040" stroke-width="1.5"/>
      <path d="M2 26l8-7 6 5 5-5 13 11" stroke="#1a2040" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <p>画像を選択してください</p>
  </div>

</main>

<canvas id="canvas"></canvas>

<script>
const fileInput    = document.getElementById("file");
const canvas       = document.getElementById("canvas");
const ctx          = canvas.getContext("2d");
const colorHexInput = document.getElementById("colorHex");
const colorBadge   = document.getElementById("colorBadge");
const glowSlider   = document.getElementById("glow");
const glowVal      = document.getElementById("glow-val");
const dlBtn        = document.getElementById("dl-btn");
const placeholder  = document.getElementById("placeholder");
const compareWrap  = document.getElementById("compare-wrap");
const enlargedWrap = document.getElementById("enlarged-wrap");

const beforeCanvas   = document.getElementById("before-canvas");
const afterCanvas    = document.getElementById("after-canvas");
const beforeEnlarged = document.getElementById("before-enlarged");
const afterEnlarged  = document.getElementById("after-enlarged");

const ENLARGE_THRESHOLD = 400;
let currentImg = null;
let validatedRgb = [58, 111, 255]; // 初期値のRGB配列 (#3a6fff)

// スライダー描画の連動
glowSlider.addEventListener("input", () => {
  glowVal.textContent = glowSlider.value;
  updateSliderTrack();
});
function updateSliderTrack() {
  const pct = (glowSlider.value / 120 * 100).toFixed(1) + "%";
  glowSlider.style.setProperty("--pct", pct);
}
updateSliderTrack();

// ── コアロジック ──
function lerp(a, b, t) { return a + (b - a) * t; }

/**
 * 16進数文字列（#ffffff形式）を解析してRGB配列を返す
 * 不正な文字列の場合は null を返す
 */
function parseHexToRgb(hexStr) {
    const match = hexStr.match(/^#?([a-fA-F0-9]{6}|[a-fA-F0-9]{3})$/);
    if (!match) return null;
    
    let hex = match[1];
    if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
    }
    const num = parseInt(hex, 16);
    return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
}

/**
 * ベースのRGBカラーから4層のグラデーションステップを動的に算出
 */
function generateGradientSteps(baseRgb) {
    const [r, g, b] = baseRgb;
    return [
        [r * 0.20, g * 0.20, b * 0.20], // c1: 影
        [r * 0.65, g * 0.65, b * 0.65], // c2: 中間
        [                               // c3: 発光ネオン
            lerp(r, 255, 0.45), 
            lerp(g, 255, 0.45), 
            lerp(b, 255, 0.45)
        ], 
        [255, 255, 255]                 // c4: ハイライト（白）
    ];
}

function sampleGradient(gray) {
    // リアルタイムに入力検証をパスした validatedRgb を元に動的生成
    const [c1, c2, c3, c4] = generateGradientSteps(validatedRgb);
    
    let t = gray / 255;
    let a, b, k;
    if(t < 0.33){      a=c1; b=c2; k=t/0.33; }
    else if(t < 0.66){ a=c2; b=c3; k=(t-0.33)/0.33; }
    else{              a=c3; b=c4; k=(t-0.66)/0.34; }
    
    return [ lerp(a[0],b[0],k), lerp(a[1],b[1],k), lerp(a[2],b[2],k) ];
}

function render(img){
    canvas.width  = img.width;
    canvas.height = img.height;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);

    let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
    let d = imageData.data;
    for(let i=0;i<d.length;i+=4){
        let gray = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
        let [r,g,b] = sampleGradient(gray);
        d[i]=r; d[i+1]=g; d[i+2]=b;
    }
    ctx.putImageData(imageData,0,0);

    const glow = glowSlider.value;
    ctx.globalCompositeOperation = "screen";
    ctx.filter = `blur(${glow}px)`;
    ctx.drawImage(canvas,0,0);
    ctx.filter = "none";
    ctx.drawImage(canvas,0,0);
    ctx.globalCompositeOperation = "source-over";
}

function copyToAfter(){
    afterCanvas.width  = canvas.width;
    afterCanvas.height = canvas.height;
    afterCanvas.getContext("2d").drawImage(canvas,0,0);
}

function copyToBefore(img){
    beforeCanvas.width  = img.width;
    beforeCanvas.height = img.height;
    beforeCanvas.getContext("2d").drawImage(img,0,0);
}

function copyToEnlarged(img){
    beforeEnlarged.width  = img.width;
    beforeEnlarged.height = img.height;
    beforeEnlarged.getContext("2d").drawImage(img,0,0);

    afterEnlarged.width  = canvas.width;
    afterEnlarged.height = canvas.height;
    afterEnlarged.getContext("2d").drawImage(canvas,0,0);
}

function needsEnlarge(img){
    return img.width < ENLARGE_THRESHOLD || img.height < ENLARGE_THRESHOLD;
}

function fullRender(img){
    render(img);
    copyToBefore(img);
    copyToAfter();

    compareWrap.classList.add("visible");
    placeholder.style.display = "none";

    if(needsEnlarge(img)){
        copyToEnlarged(img);
        enlargedWrap.classList.add("visible");
    } else {
        enlargedWrap.classList.remove("visible");
    }

    dlBtn.disabled = false;
    dlBtn.classList.add("active");
}

// ── インプット変更時のリアルタイムバリデーションと処理 ──
function handleColorInputChange() {
    const value = colorHexInput.value.trim();
    const rgb = parseHexToRgb(value);
    
    if (rgb) {
        colorHexInput.classList.remove("invalid");
        validatedRgb = rgb;
        // 先頭に # が抜けている場合は自動補完
        const formattedHex = value.startsWith('#') ? value : '#' + value;
        colorBadge.style.backgroundColor = formattedHex;
        
        if (currentImg) fullRender(currentImg);
    } else {
        // 不正な値のときは赤枠にして再描画をスキップ（入力中のストレス緩和）
        colorHexInput.classList.add("invalid");
    }
}

colorHexInput.addEventListener("input", handleColorInputChange);

// 初期カラーバッジの同期
colorBadge.style.backgroundColor = colorHexInput.value;

// ダウンロード
dlBtn.addEventListener("click", () => {
    if(dlBtn.disabled) return;
    const link = document.createElement("a");
    link.download = "glow_filtered.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
});

// ファイル読み込み
fileInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = () => {
        currentImg = img;
        fullRender(img);
        
        glowSlider.oninput = () => {
            glowVal.textContent = glowSlider.value;
            updateSliderTrack();
            if(currentImg) fullRender(currentImg);
        };
    };
    img.src = URL.createObjectURL(file);
});
</script>

</body>
</html>
